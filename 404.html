<!DOCTYPE html>
<html lang="cs">

<head>
    <meta charset="UTF-8">
    <meta name="robots" content="noindex, nofollow">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stránka nenalezena | Bc. Barbora Šestáková</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <style>
        body {
            background-color: var(--secondary);
            color: var(--white);
        }

        .error-page {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            text-align: center;
            padding: 2rem;
        }

        .error-title {
            font-size: clamp(6rem, 15vw, 12rem);
            font-weight: 800;
            line-height: 1;
            margin-bottom: 0.5rem;
            background: linear-gradient(135deg, var(--cta), var(--primary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            color: transparent;
        }

        .error-page h1 {
            color: var(--white);
            margin-bottom: 1.5rem;
        }

        .error-page p {
            font-size: 1.125rem;
            color: rgba(255, 255, 255, 0.9);
            max-width: 600px;
            margin: 0 auto 2.5rem auto;
            line-height: 1.6;
        }

        .error-page .btn {
            padding-right: 2rem;
        }
    </style>
</head>

<body>
    <div class="error-page container">
        <div class="error-title">404</div>
        <h1>Stránka nebyla nalezena</h1>
        <p>Stránka, kterou hledáte, si nejspíš natáhla sval a potřebuje chvilku pauzu.<br>Možná jsme ji přesunuli nebo
            upravili.</p>
        <a href="index.html" class="btn btn-primary mt-4">Zpět na hlavní stránku</a>
    </div>
</body>

</html>
